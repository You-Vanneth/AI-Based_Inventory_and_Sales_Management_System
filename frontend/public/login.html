<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | AI Inventory System</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <main class="login-wrap">
    <div class="login-shell">
      <section class="login-brand">
        <h1>Smart Inventory Control</h1>
        <p class="mb-14">Professional management for products, sales, stock movement, and decision support.</p>
        <div class="grid grid-4">
          <article class="kpi"><div class="kpi-label">Security</div><div class="kpi-value">JWT</div></article>
          <article class="kpi"><div class="kpi-label">Inventory</div><div class="kpi-value">Live</div></article>
          <article class="kpi"><div class="kpi-label">Sales</div><div class="kpi-value">Tracked</div></article>
          <article class="kpi"><div class="kpi-label">Forecast</div><div class="kpi-value">Ready</div></article>
        </div>
      </section>

      <section class="card login-card">
        <h2>Sign In</h2>
        <p>Use your staff or admin account.</p>

        <form id="loginForm" class="grid mt-16">
          <div>
            <label>Email</label>
            <input id="email" type="email" required />
          </div>
          <div>
            <label>Password</label>
            <input id="password" type="password" required />
          </div>
          <button type="submit">Login</button>
        </form>

        <div id="msg"></div>
      </section>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script src="/assets/pages/login.js"></script>
</body>
</html>
