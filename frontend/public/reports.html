<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports | AI Inventory System</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div id="app-nav"></div>
  <main class="container layout">
    <section class="hero">
      <h2>Reports Center</h2>
      <p>Daily/Monthly sales, stock alerts, and AI reorder insight.</p>
    </section>

    <section class="card">
      <h3 class="card-title">Report Type</h3>
      <div class="row">
        <div>
          <label>Select Report</label>
          <select id="reportType">
            <option value="sales-daily">Sales Daily</option>
            <option value="sales-monthly">Sales Monthly</option>
            <option value="stock-low">Stock Low</option>
            <option value="stock-expiry">Stock Expiry</option>
            <option value="ai-reorder">AI Reorder Suggestions</option>
          </select>
        </div>
        <div>
          <label>Date From</label>
          <input id="dateFrom" type="date" />
        </div>
        <div>
          <label>Date To</label>
          <input id="dateTo" type="date" />
        </div>
        <div>
          <label>Action</label>
          <button id="runBtn" type="button">Run Report</button>
        </div>
      </div>
      <div id="msg"></div>
    </section>

    <section class="card">
      <h3 class="card-title">Result</h3>
      <div class="table-wrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
  <script src="/assets/pages/reports.js"></script>
</body>
</html>
